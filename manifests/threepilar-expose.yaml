---
apiVersion: v1
kind: Service
metadata:
  name: threepilar-frontend-service
  namespace: ns1
spec:
  selector:
    app: threepilar-frontend
  ports:
    - protocol: TCP
      port: 8090
      targetPort: 8090
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: threepilar-backend-service
  namespace: ns1
spec:
  selector:
    app: threepilar-backend
  ports:
    - protocol: TCP
      port: 8091
      targetPort: 8091
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: threepilar-frontend-route
  namespace: ns1
spec:
  path: "/ping"
  to:
    kind: Service
    name: threepilar-frontend-service
    weight: 100
  port:
    targetPort: 8090
